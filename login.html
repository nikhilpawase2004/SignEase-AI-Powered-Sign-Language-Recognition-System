<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SignEase — Login to your account">
    <title>SignEase — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080c14;
            --card-bg: rgba(15, 22, 36, 0.85);
            --border: rgba(99, 179, 237, 0.15);
            --border-glow: rgba(99, 179, 237, 0.35);
            --accent: #63b3ed;
            --accent2: #a78bfa;
            --text: #e2e8f0;
            --text-muted: #718096;
            --error: #fc8181;
            --success: #68d391;
            --input-bg: rgba(255,255,255,0.04);
            --input-border: rgba(99,179,237,0.2);
            --input-focus: rgba(99,179,237,0.5);
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow: hidden;
            position: relative;
        }

        /* ── Animated Orbs ── */
        .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: float linear infinite;
        }
        .orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, #3b82f6 0%, transparent 70%); top: -200px; left: -200px; animation-duration: 20s; }
        .orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, #8b5cf6 0%, transparent 70%); bottom: -150px; right: -150px; animation-duration: 25s; animation-delay: -8s; }
        .orb-3 { width: 350px; height: 350px; background: radial-gradient(circle, #06b6d4 0%, transparent 70%); top: 40%; left: 60%; animation-duration: 18s; animation-delay: -3s; }
        @keyframes float {
            0%   { transform: translate(0, 0) rotate(0deg); }
            33%  { transform: translate(30px, -20px) rotate(120deg); }
            66%  { transform: translate(-20px, 30px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* ── Dot grid ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: radial-gradient(circle, rgba(99,179,237,0.07) 1px, transparent 1px);
            background-size: 28px 28px;
            z-index: 0;
        }

        /* ── Card ── */
        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset,
                        0 20px 60px rgba(0,0,0,0.5),
                        0 0 80px rgba(99,179,237,0.06);
            position: relative;
            overflow: hidden;
        }

        /* gradient top border */
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #63b3ed, #a78bfa, transparent);
        }

        /* ── Logo ── */
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, rgba(99,179,237,0.2), rgba(167,139,250,0.2));
            border: 1px solid rgba(99,179,237,0.3);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent);
        }
        .logo-text { font-size: 1.3rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
        .logo-version { font-size: 0.7rem; background: rgba(99,179,237,0.12); color: var(--accent); border: 1px solid rgba(99,179,237,0.2); border-radius: 20px; padding: 1px 8px; font-weight: 600; }

        /* ── Heading ── */
        .auth-heading { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem; }
        .auth-sub { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 1.75rem; }

        /* ── Alert ── */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.84rem;
            margin-bottom: 1.25rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .alert-error { background: rgba(252,129,129,0.1); border: 1px solid rgba(252,129,129,0.25); color: var(--error); }
        .alert-success { background: rgba(104,211,145,0.1); border: 1px solid rgba(104,211,145,0.25); color: var(--success); }

        /* ── Form ── */
        .form-group { margin-bottom: 1.1rem; }
        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.45rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .form-input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input::placeholder { color: var(--text-muted); opacity: 0.6; }
        .form-input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(99,179,237,0.1);
        }

        /* ── Submit Button ── */
        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            margin-top: 0.5rem;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(59,130,246,0.35);
            letter-spacing: 0.01em;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(59,130,246,0.45); }
        .btn-submit:active { transform: translateY(0); }

        /* ── Footer link ── */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .auth-footer a:hover { color: var(--accent2); }

        /* ── Shimmer on hover ── */
        .auth-card:hover::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: shimmer 0.7s ease;
        }
        @keyframes shimmer { to { left: 150%; } }
    </style>
</head>

<body>
    <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"/>
                        <path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"/>
                        <path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/>
                        <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
                    </svg>
                </div>
                <span class="logo-text">SignEase</span>
                <span class="logo-version">v2.0</span>
            </div>

            <h1 class="auth-heading">Welcome back</h1>
            <p class="auth-sub">Sign in to continue to your dashboard</p>

            {% if error %}
            <div class="alert alert-error" role="alert">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button class="btn-submit" type="submit" id="login-btn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/register">Create one</a>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function() {
            const btn = document.getElementById('login-btn');
            btn.textContent = 'Signing in...';
            btn.disabled = true;
        });
    </script>
</body>

</html>
